name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: macos-latest
            asset_suffix: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install -e .[build]

      - name: Build binary
        run: bash scripts/build-release.sh

      - name: Rename release archive
        run: mv "dist/vulnlab-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m).tar.gz" "dist/vulnlab-${{ matrix.asset_suffix }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnlab-${{ matrix.asset_suffix }}
          path: dist/vulnlab-${{ matrix.asset_suffix }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
